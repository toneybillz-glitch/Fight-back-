<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Justify — AI Legal Defense for Everyone</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:#04050a;font-family:'Inter',system-ui,sans-serif;color:#f0f0f0;min-height:100vh;overflow-x:hidden}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-track{background:#04050a}
    ::-webkit-scrollbar-thumb{border-radius:3px;background:linear-gradient(#7c3aed,#2563eb)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes float{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(2deg)}}
    @keyframes gradMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    @keyframes glowPulse{0%,100%{box-shadow:0 0 20px rgba(124,58,237,.3)}50%{box-shadow:0 0 40px rgba(124,58,237,.6),0 0 80px rgba(37,99,235,.2)}}
    @keyframes scanLine{0%{top:0%}100%{top:100%}}
    @keyframes slideLeft{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
    @keyframes countUp{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
    @keyframes borderDance{0%,100%{border-color:rgba(124,58,237,.3)}50%{border-color:rgba(37,99,235,.6)}}

    .fade-up{animation:fadeUp .5s cubic-bezier(.22,.68,0,1.2) both}
    .fade-in{animation:fadeIn .3s ease both}
    .slide-left{animation:slideLeft .4s cubic-bezier(.22,.68,0,1.2) both}

    .grad-text{background:linear-gradient(135deg,#a78bfa,#60a5fa,#a78bfa);background-size:200% auto;WebkitBackgroundClip:text;WebkitTextFillColor:transparent;backgroundClip:text;animation:gradMove 3s linear infinite}

    .tool-btn{
      padding:0;border:none;cursor:pointer;font-family:inherit;
      border-radius:20px;transition:all .3s cubic-bezier(.22,.68,0,1.2);
      position:relative;overflow:hidden;
    }
    .tool-btn:hover{transform:translateY(-6px) scale(1.02)}
    .tool-btn:active{transform:translateY(-2px) scale(.99)}

    .action-btn{
      border:none;cursor:pointer;font-family:inherit;font-weight:800;
      background:linear-gradient(135deg,#7c3aed,#2563eb);
      color:#fff;border-radius:14px;
      transition:all .2s;position:relative;overflow:hidden;
      letter-spacing:.3px;
    }
    .action-btn::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transition:left .5s}
    .action-btn:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(124,58,237,.4)}
    .action-btn:hover::after{left:150%}
    .action-btn:active{transform:translateY(0)}
    .action-btn:disabled{background:#1a1a2e;color:#333;cursor:not-allowed;transform:none;box-shadow:none}
    .action-btn:disabled::after{display:none}

    .ghost-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;color:#555;font-family:inherit;font-weight:600;cursor:pointer;transition:all .2s}
    .ghost-btn:hover{border-color:rgba(124,58,237,.4);color:#a78bfa;background:rgba(124,58,237,.06)}

    .glass{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:20px}
    .glass-purple{background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.2);border-radius:16px}
    .glass-blue{background:rgba(37,99,235,.06);border:1px solid rgba(37,99,235,.2);border-radius:16px}

    .field{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;color:#f0f0f0;padding:15px 18px;font-size:14px;font-family:inherit;outline:none;transition:all .2s;appearance:none;line-height:1.5}
    .field:focus{border-color:rgba(124,58,237,.6);background:rgba(124,58,237,.06);box-shadow:0 0 0 4px rgba(124,58,237,.1)}
    .field option{background:#0a0b14}
    textarea.field{resize:vertical;min-height:120px}

    .topic-card{padding:16px;border-radius:14px;cursor:pointer;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02);transition:all .2s;text-align:left;font-family:inherit;width:100%;display:flex;align-items:flex-start;gap:12px}
    .topic-card:hover{border-color:rgba(124,58,237,.35);background:rgba(124,58,237,.06);transform:translateX(4px)}
    .topic-card.selected{border-color:rgba(124,58,237,.6);background:rgba(124,58,237,.1);box-shadow:0 0 0 1px rgba(124,58,237,.2)}

    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.6px}
    .badge-red{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#f87171}
    .badge-yellow{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.22);color:#fbbf24}
    .badge-green{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.18);color:#34d399}
    .badge-purple{background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.25);color:#a78bfa}

    .nav-pill{padding:7px 16px;border-radius:100px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid transparent;transition:all .2s;font-family:inherit;white-space:nowrap;letter-spacing:.3px}
    .nav-pill.active{background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.4);color:#a78bfa}
    .nav-pill.inactive{background:transparent;border-color:transparent;color:#333}
    .nav-pill.inactive:hover{color:#666}

    .doc-drop{border:2px dashed rgba(124,58,237,.3);border-radius:16px;padding:32px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(124,58,237,.03)}
    .doc-drop:hover{border-color:rgba(124,58,237,.6);background:rgba(124,58,237,.08)}
    .doc-drop.active{border-color:#7c3aed;background:rgba(124,58,237,.12)}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const {useState,useEffect,useRef,useCallback}=React;

  // ── Constants ──────────────────────────────────────────────────────────────
  const US_STATES=["Alabama","Alaska","Arizona","Arkansas","California","Colorado","Connecticut","Delaware","Florida","Georgia","Hawaii","Idaho","Illinois","Indiana","Iowa","Kansas","Kentucky","Louisiana","Maine","Maryland","Massachusetts","Michigan","Minnesota","Mississippi","Missouri","Montana","Nebraska","Nevada","New Hampshire","New Jersey","New Mexico","New York","North Carolina","North Dakota","Ohio","Oklahoma","Oregon","Pennsylvania","Rhode Island","South Carolina","South Dakota","Tennessee","Texas","Utah","Vermont","Virginia","Washington","West Virginia","Wisconsin","Wyoming"];

  const TOOLS=[
    {id:"fight",icon:"⚔️",label:"Legal Defense",sub:"Tickets · Debt · Eviction · Court",color:"#ef4444",grad:"linear-gradient(135deg,#7f1d1d,#dc2626,#7f1d1d)",badge:"badge-red",badgeLabel:"⚡ MOST USED"},
    {id:"support",icon:"⚖️",label:"Child Support",sub:"Payer · Receiver · Modification",color:"#3b82f6",grad:"linear-gradient(135deg,#1e3a8a,#2563eb,#1e3a8a)",badge:"badge-blue",badgeLabel:"👶 FAMILY"},
    {id:"expunge",icon:"📜",label:"Record Expungement",sub:"Clear old charges · Get a fresh start",color:"#10b981",grad:"linear-gradient(135deg,#064e3b,#059669,#064e3b)",badge:"badge-green",badgeLabel:"🔓 NEW"},
    {id:"wage",icon:"💸",label:"Wage Theft Fighter",sub:"Unpaid wages · Overtime · Tips",color:"#f59e0b",grad:"linear-gradient(135deg,#78350f,#d97706,#78350f)",badge:"badge-yellow",badgeLabel:"💰 HOT"},
    {id:"loan",icon:"📄",label:"Predatory Loan Decoder",sub:"Payday loans · Hidden fees · Traps",color:"#8b5cf6",grad:"linear-gradient(135deg,#4c1d95,#7c3aed,#4c1d95)",badge:"badge-purple",badgeLabel:"🔍 SCAN"},
    {id:"docs",icon:"🔍",label:"Document Scanner",sub:"Upload any letter · AI reads it all",color:"#a78bfa",grad:"linear-gradient(135deg,#312e81,#6d28d9,#312e81)",badge:"badge-purple",badgeLabel:"📁 UPLOAD"},
  ];

  const FIGHT_TOPICS=[
    {id:"ticket",icon:"🚨",label:"Traffic Ticket",urgency:"med",sub:"Fight your ticket and know your rights"},
    {id:"debt",icon:"📞",label:"Debt Collector",urgency:"high",sub:"Stop the calls — know what they can't do"},
    {id:"eviction",icon:"🏠",label:"Eviction / Landlord",urgency:"high",sub:"Respond to notices and buy yourself time"},
    {id:"court",icon:"⚖️",label:"Court Summons",urgency:"high",sub:"Know exactly what to do and when"},
    {id:"employer",icon:"💼",label:"Employer Dispute",urgency:"med",sub:"Wage theft, wrongful termination, and more"},
    {id:"other",icon:"📄",label:"Other Legal Issue",urgency:"low",sub:"Describe anything — AI reads it all"},
  ];

  const SUPPORT_TOPICS_PAYER=[
    {id:"lost_job",icon:"💼",label:"Lost Job / Income Dropped",urgency:"high",sub:"Emergency steps before you fall behind"},
    {id:"behind",icon:"⚠️",label:"I'm Behind on Payments",urgency:"high",sub:"Consequences and options right now"},
    {id:"modify",icon:"📋",label:"Want to Lower My Payment",urgency:"med",sub:"File a modification — changed circumstances"},
    {id:"court",icon:"⚖️",label:"I Have a Court Date",urgency:"high",sub:"What to say, what to bring"},
    {id:"jail",icon:"🔒",label:"Afraid of Going to Jail",urgency:"high",sub:"What actually happens and how to prevent it"},
    {id:"other",icon:"💬",label:"Other Situation",urgency:"low",sub:"Describe it — get personalized guidance"},
  ];

  const SUPPORT_TOPICS_RECEIVER=[
    {id:"not_paying",icon:"🚫",label:"They Haven't Paid",urgency:"high",sub:"Enforcement options ranked by speed"},
    {id:"enforce",icon:"⚡",label:"Force Them to Pay",urgency:"high",sub:"License suspension, tax intercept, contempt"},
    {id:"hiding",icon:"🕵️",label:"Hiding Their Income",urgency:"med",sub:"Request financial disclosure and prove it"},
    {id:"court",icon:"⚖️",label:"I Have a Court Date",urgency:"high",sub:"How to present your case"},
    {id:"increase",icon:"📈",label:"Need More Money",urgency:"med",sub:"When and how to request an increase"},
    {id:"other",icon:"💬",label:"Other Situation",urgency:"low",sub:"Describe it — get personalized guidance"},
  ];

  // ── Helpers ────────────────────────────────────────────────────────────────
  const loadCases=()=>{try{return JSON.parse(localStorage.getItem("jsfy_cases")||"[]")}catch{return[]}};
  const saveCases=c=>{try{localStorage.setItem("jsfy_cases",JSON.stringify(c))}catch{}};
  const loadFree=()=>{try{return parseInt(localStorage.getItem("jsfy_free")||"0")}catch{return 0}};
  const bumpFree=()=>{try{const n=loadFree()+1;localStorage.setItem("jsfy_free",n);return n}catch{return 1}};

  // ── Background ─────────────────────────────────────────────────────────────
  const Bg=()=>(
    <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,backgroundImage:"linear-gradient(rgba(124,58,237,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,.018) 1px,transparent 1px)",backgroundSize:"72px 72px"}}/>
      <div style={{position:"absolute",top:-300,right:-200,width:700,height:700,borderRadius:"50%",background:"radial-gradient(circle,rgba(124,58,237,.09) 0%,transparent 60%)"}}/>
      <div style={{position:"absolute",bottom:-200,left:-200,width:600,height:600,borderRadius:"50%",background:"radial-gradient(circle,rgba(37,99,235,.07) 0%,transparent 60%)"}}/>
      <div style={{position:"absolute",top:"40%",left:"50%",transform:"translate(-50%,-50%)",width:800,height:800,borderRadius:"50%",background:"radial-gradient(circle,rgba(124,58,237,.03) 0%,transparent 50%)"}}/>
    </div>
  );

  // ── Spinner ────────────────────────────────────────────────────────────────
  const Spinner=({label="Analyzing your situation..."})=>(
    <div className="glass fade-in" style={{padding:56,textAlign:"center"}}>
      <div style={{position:"relative",width:64,height:64,margin:"0 auto 24px"}}>
        <div style={{width:64,height:64,border:"3px solid #1a1a2e",borderTop:"3px solid #7c3aed",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>
        <div style={{width:64,height:64,border:"3px solid transparent",borderBottom:"3px solid #2563eb",borderRadius:"50%",position:"absolute",inset:0,animation:"spin 1.1s linear infinite reverse"}}/>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>⚡</div>
      </div>
      <div style={{fontSize:16,fontWeight:800,color:"#fff",marginBottom:8}}>{label}</div>
      <div style={{fontSize:12,color:"#333",animation:"pulse 1.5s infinite"}}>Powered by AI · Takes 10–20 seconds</div>
    </div>
  );

  // ── Urgency badge ──────────────────────────────────────────────────────────
  const Urgency=({level})=>{
    const map={high:["badge-red","⚡ URGENT"],med:["badge-yellow","⚠ MODERATE"],low:["badge-green","✓ LOW"]};
    const [cls,label]=map[level]||map.low;
    return <span className={`badge ${cls}`}>{label}</span>;
  };

  // ── API call ───────────────────────────────────────────────────────────────
  const callAI=async(apiKey,system,userContent)=>{
    const res=await fetch("/api/analyze",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1500,system,messages:[{role:"user",content:userContent}]})
    });
    const data=await res.json();
    return data.content?.find(b=>b.type==="text")?.text||"No response returned.";
  };

  // ResultPanel defined below with teaser + PDF support

  // ── Paywall ────────────────────────────────────────────────────────────────
  const Paywall=({onClose})=>{
    const [name,setName]=useState("");
    const [email,setEmail]=useState("");
    const valid=name.trim().length>1&&email.includes("@")&&email.includes(".");
    return(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20,backdropFilter:"blur(12px)"}} onClick={onClose}>
        <div className="glass fade-up" style={{maxWidth:440,width:"100%",padding:36,borderColor:"rgba(124,58,237,.3)",animation:"glowPulse 2s infinite"}} onClick={e=>e.stopPropagation()}>
          <div className="badge badge-purple" style={{marginBottom:20}}>🔒 FREE ANALYSIS USED</div>
          <div style={{fontSize:28,fontWeight:900,letterSpacing:-.5,marginBottom:8,lineHeight:1.2}}>You've seen what Justify can do.</div>
          <div style={{fontSize:14,color:"#555",lineHeight:1.7,marginBottom:24}}>Unlock unlimited access to every tool — Legal Defense, Child Support, Expungement, Wage Theft, and more — for less than a coffee a week.</div>
          <div style={{background:"linear-gradient(135deg,rgba(124,58,237,.1),rgba(37,99,235,.06))",border:"1px solid rgba(124,58,237,.2)",borderRadius:16,padding:20,marginBottom:24}}>
            <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:12}}>
              <div style={{fontSize:38,fontWeight:900,background:"linear-gradient(135deg,#a78bfa,#60a5fa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>$9.99</div>
              <div style={{fontSize:14,color:"#444"}}>/month</div>
              <div style={{fontSize:12,color:"#333",textDecoration:"line-through"}}>$49.99</div>
            </div>
            {["✓ Unlimited analyses across all 6 tools","✓ Full response letter generator","✓ Case tracker with AI check-ins","✓ Document scanner — upload any letter","✓ 50 states covered","✓ Cancel anytime"].map(f=>(
              <div key={f} style={{fontSize:13,color:"#777",marginBottom:6}}>{f}</div>
            ))}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="First name" className="field" style={{padding:"12px 16px",fontSize:13}}/>
            <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email address" type="email" className="field" style={{padding:"12px 16px",fontSize:13}}/>
            <button disabled={!valid} className="action-btn" style={{padding:"16px 0",fontSize:15,opacity:valid?1:.4}}>Unlock Justify — $9.99/mo →</button>
          </div>
          <div style={{textAlign:"center",fontSize:11,color:"#222",marginBottom:14}}>Secure · Cancel anytime · No hidden fees</div>
          <div style={{borderTop:"1px solid rgba(255,255,255,.05)",paddingTop:14,textAlign:"center"}}>
            <button onClick={onClose} style={{background:"none",border:"1px solid rgba(255,255,255,.06)",borderRadius:10,color:"#333",padding:"9px 20px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Book a $47 1-on-1 Session Instead</button>
          </div>
        </div>
      </div>
    );
  };

  // ══════════════════════════════════════════════════════════════════════════
  // TOOL: LEGAL DEFENSE
  // ══════════════════════════════════════════════════════════════════════════
  const FightTool=({apiKey,onRequestKey,checkAccess,onAnalysisDone,onSaveCase,isPro,onUpgrade})=>{
    const [phase,setPhase]=useState("topics");
    const [topic,setTopic]=useState(null);
    const [state,setState]=useState("");
    const [doc,setDoc]=useState("");
    const [situation,setSituation]=useState("");
    const [result,setResult]=useState("");
    const [err,setErr]=useState("");

    const go=async()=>{
      if(!checkAccess())return;
      if(!apiKey){onRequestKey();setErr("Add your API key first.");return;}
      if(!situation.trim()&&!doc.trim()){setErr("Describe your situation or paste your document.");return;}
      setErr("");setPhase("loading");
      try{
        const text=await callAI(apiKey,
          "You are an aggressive legal defense advisor for everyday people. Be direct, specific, cite laws, give exact scripts. Plain text only — no markdown, no bullets. Use ALL CAPS section headers followed by colons.",
          `CASE: ${topic?.label}\nSTATE: ${state||"Not specified"}\n${doc?`DOCUMENT:\n${doc}\n\n`:""}SITUATION:\n${situation}\n\nGive:\nWHAT THIS IS:\nTHEIR RIGHTS:\nIMMEDIATE ACTIONS:\nWHAT TO SAY:\nWHAT NOT TO DO:\nREALISTIC OUTCOME:`
        );
        setResult(text);setPhase("result");onAnalysisDone();
      }catch(e){setResult("Error: "+e.message);setPhase("result");}
    };

    const save=()=>onSaveCase({id:Date.now(),tool:"Legal Defense",icon:"⚔️",topic:topic?.label,state,situation:situation.slice(0,100),result,status:"Active",urgency:topic?.urgency||"med",date:new Date().toLocaleDateString(),deadline:"",notes:""});
    const reset=()=>{setPhase("topics");setTopic(null);setSituation("");setDoc("");setResult("");setErr("");};

    if(phase==="loading")return <Spinner/>;
    if(phase==="result")return <ResultPanel result={result} title={topic?.label} icon={topic?.icon} onNew={reset} onSave={save} isPro={isPro} onUpgrade={onUpgrade}/>;

    return(
      <div>
        {phase==="topics"&&(
          <div className="fade-up">
            <div style={{marginBottom:22}}>
              <div style={{fontSize:11,color:"#ef4444",fontWeight:700,letterSpacing:1.2,marginBottom:6}}>⚔️ LEGAL DEFENSE</div>
              <div style={{fontSize:22,fontWeight:900,letterSpacing:-.5}}>What are you dealing with?</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
              {FIGHT_TOPICS.map(t=>(
                <button key={t.id} onClick={()=>{setTopic(t);setPhase("input");}} className="topic-card">
                  <span style={{fontSize:22,flexShrink:0}}>{t.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:700,color:"#f0f0f0",marginBottom:2}}>{t.label}</div>
                    <div style={{fontSize:12,color:"#555"}}>{t.sub}</div>
                  </div>
                  <Urgency level={t.urgency}/>
                </button>
              ))}
            </div>
          </div>
        )}
        {phase==="input"&&(
          <div className="fade-up">
            <button onClick={()=>setPhase("topics")} style={{background:"none",border:"none",color:"#444",fontSize:13,cursor:"pointer",fontFamily:"inherit",marginBottom:18,display:"flex",alignItems:"center",gap:5}}>← Back</button>
            <div style={{marginBottom:20}}>
              <div style={{fontSize:11,color:"#ef4444",fontWeight:700,letterSpacing:1.2,marginBottom:4}}>{topic?.icon} {topic?.label?.toUpperCase()}</div>
              <div style={{fontSize:20,fontWeight:900}}>Tell us your situation.</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <select value={state} onChange={e=>setState(e.target.value)} className="field">
                <option value="">Your state (recommended)</option>
                {US_STATES.map(s=><option key={s}>{s}</option>)}
              </select>
              <textarea value={doc} onChange={e=>setDoc(e.target.value)} className="field" placeholder="Paste the exact text of your letter, notice, or document here (optional but powerful)..." style={{minHeight:90}}/>
              <textarea value={situation} onChange={e=>{setSituation(e.target.value);setErr("");}} className="field" placeholder="Describe what happened, when, any deadlines, what they said..." style={{minHeight:110}}/>
              {err&&<div style={{background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.2)",borderRadius:10,padding:"12px 16px",fontSize:13,color:"#f87171"}}>⚠ {err}</div>}
              <button onClick={go} disabled={!situation.trim()&&!doc.trim()} className="action-btn" style={{padding:"17px 0",fontSize:15}}>⚔️ Analyze My Case</button>
              <div style={{fontSize:11,color:"#222",textAlign:"center"}}>Your information is never stored or shared.</div>
            </div>
          </div>
        )}
      </div>
    );
  };

  // ══════════════════════════════════════════════════════════════════════════
  // TOOL: CHILD SUPPORT
  // ══════════════════════════════════════════════════════════════════════════
  const SupportTool=({apiKey,onRequestKey,checkAccess,onAnalysisDone,onSaveCase,isPro,onUpgrade})=>{
    const [side,setSide]=useState(null); // null | payer | receiver
    const [phase,setPhase]=useState("side");
    const [topic,setTopic]=useState(null);
    const [state,setState]=useState("");
    const [order,setOrder]=useState("");
    const [income,setIncome]=useState("");
    const [situation,setSituation]=useState("");

  const generatePDF=(title,content,userName="")=>{
    const date=new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>${title}</title><style>body{font-family:Georgia,serif;max-width:700px;margin:40px auto;padding:0 40px;color:#1a1a1a;line-height:1.8}h1{font-size:22px;border-bottom:2px solid #1a1a1a;padding-bottom:12px;margin-bottom:8px}h2{font-size:14px;color:#555;font-weight:normal;margin-bottom:32px}.date{font-size:13px;color:#888;margin-bottom:32px}pre{white-space:pre-wrap;font-family:Georgia,serif;font-size:14px;line-height:1.9}.footer{margin-top:48px;padding-top:16px;border-top:1px solid #ccc;font-size:11px;color:#999}</style></head><body><h1>Justify — ${title}</h1><h2>AI Legal Guidance Report</h2><div class="date">Generated: ${date}${userName?` · For: ${userName}`:""}</div><pre>${content}</pre><div class="footer">⚠ This document was generated by Justify AI and provides legal information only, not legal advice. Justify is not a law firm. Consult a licensed attorney in your state for legal counsel. justify.ai</div></body></html>`;
    const blob=new Blob([html],{type:"text/html"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`Justify-${title.replace(/\s+/g,"-")}-${Date.now()}.html`;
    a.click();URL.revokeObjectURL(url);
  };

    const toolProps={apiKey,onRequestKey:()=>setShowKey(true),checkAccess,onAnalysisDone,onSaveCase:saveCase,isPro,onUpgrade:()=>setShowPaywall(true)};

    return(
      <div style={{minHeight:"100vh",background:"#04050a",position:"relative"}}>
        <Bg/>

        {/* Disclaimer gate — first time only */}
        {!disclaimerAccepted&&<DisclaimerGate onAccept={acceptDisclaimer}/>}

        {/* Nav */}
        <nav style={{position:"sticky",top:0,zIndex:300,background:"rgba(4,5,10,.93)",backdropFilter:"blur(28px)",borderBottom:"1px solid rgba(255,255,255,.04)",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
          <button onClick={()=>setScreen("home")} style={{display:"flex",alignItems:"center",gap:10,background:"none",border:"none",cursor:"pointer",padding:0,fontFamily:"inherit"}}>
            <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#7c3aed,#2563eb)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:900,color:"#fff",boxShadow:"0 0 20px rgba(124,58,237,.35)",animation:"glowPulse 2.5s infinite"}}>J</div>
            <div style={{textAlign:"left"}}>
              <div style={{fontSize:15,fontWeight:900,letterSpacing:-.5,color:"#f0f0f0"}}>Justify</div>
              <div style={{fontSize:9,color:"#3730a3",letterSpacing:1.5,fontWeight:700}}>AI LEGAL DEFENSE</div>
            </div>
          </button>
          <div style={{display:"flex",gap:4,overflowX:"auto"}}>
            {NAV_ITEMS.map(n=>(
              <button key={n.id} onClick={()=>{if(n.id==="tracker"){setScreen("tracker");}else if(n.id==="home"){setScreen("home");}else{setScreen("tool");}}}
                className={`nav-pill ${(screen===n.id||(n.id==="tool"&&screen==="tool"))?"active":"inactive"}`}>
                {n.label}
              </button>
            ))}
          </div>
          <div style={{display:"flex",gap:6,flexShrink:0}}>
            {!isPro&&<button onClick={()=>setShowPaywall(true)} style={{background:"rgba(124,58,237,.1)",border:"1px solid rgba(124,58,237,.25)",borderRadius:8,color:"#a78bfa",fontSize:11,fontWeight:700,padding:"7px 10px",cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>🔓 Pro</button>}
            {isPro&&<div style={{background:"rgba(52,211,153,.08)",border:"1px solid rgba(52,211,153,.2)",borderRadius:8,color:"#34d399",fontSize:11,fontWeight:700,padding:"7px 10px"}}>✓ PRO</div>}
            <button onClick={()=>setShowKey(!showKey)} style={{background:apiKey?"rgba(52,211,153,.08)":"rgba(239,68,68,.08)",border:`1px solid ${apiKey?"rgba(52,211,153,.2)":"rgba(239,68,68,.2)"}`,borderRadius:8,color:apiKey?"#34d399":"#f87171",fontSize:11,fontWeight:700,padding:"7px 10px",cursor:"pointer",fontFamily:"inherit"}}>
              {apiKey?"✓":"⚙"}
            </button>
          </div>
        </nav>

        {/* Banners */}
        {!isPro&&freeUsed<1&&(
          <div style={{background:"rgba(124,58,237,.06)",borderBottom:"1px solid rgba(124,58,237,.1)",padding:"9px 24px",textAlign:"center",fontSize:12,color:"#a78bfa",fontWeight:600}}>
            ⚡ You have <strong>1 free preview</strong> — upgrade to unlock the full analysis
          </div>
        )}
        {!isPro&&freeUsed>=1&&(
          <div onClick={()=>setShowPaywall(true)} style={{background:"rgba(124,58,237,.08)",borderBottom:"1px solid rgba(124,58,237,.15)",padding:"9px 24px",textAlign:"center",fontSize:12,color:"#a78bfa",fontWeight:700,cursor:"pointer"}}>
            🔒 Upgrade to unlock full analysis + scripts + PDF downloads — $9.99/mo
          </div>
        )}

        {/* API Key */}
        {showKey&&(
          <div style={{background:"rgba(4,5,10,.97)",borderBottom:"1px solid rgba(255,255,255,.04)",padding:"12px 24px",display:"flex",gap:8,position:"relative",zIndex:200}}>
            <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="Paste Anthropic API key (sk-ant-...)" className="field" style={{flex:1}}/>
            <button onClick={()=>setShowKey(false)} className="action-btn" style={{borderRadius:12,padding:"11px 20px",fontSize:13}}>Save</button>
          </div>
        )}

        <div style={{maxWidth:640,margin:"0 auto",padding:"32px 20px 80px",position:"relative",zIndex:1}}>
          {screen==="home"&&<Home onSelect={selectTool}/>}
          {screen==="tool"&&tool==="fight"&&<FightTool {...toolProps}/>}
          {screen==="tool"&&tool==="support"&&<SupportTool {...toolProps}/>}
          {screen==="tool"&&tool==="expunge"&&<ExpungeTool {...toolProps}/>}
          {screen==="tool"&&tool==="wage"&&<WageTool {...toolProps}/>}
          {screen==="tool"&&tool==="loan"&&<LoanTool {...toolProps}/>}
          {screen==="tool"&&tool==="docs"&&<DocsTool {...toolProps}/>}
          {screen==="tracker"&&<Tracker cases={cases} onUpdate={updateCase} onDelete={deleteCase} apiKey={apiKey} onRequestKey={()=>setShowKey(true)}/>}
        </div>

        {showPaywall&&<Paywall onClose={()=>setShowPaywall(false)}/>}
        {toast&&(
          <div style={{position:"fixed",bottom:24,right:24,background:"#111",border:"1px solid rgba(124,58,237,.3)",borderRadius:12,padding:"14px 20px",fontSize:13,fontWeight:600,color:"#a78bfa",zIndex:9999,animation:"fadeUp .3s ease"}}>
            {toast}
          </div>
        )}
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
