const callAI=async(system,userContent)=>{
  const res=await fetch("/api/analyze",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1500,system,messages:[{role:"user",content:userContent}]})
  });
  const data=await res.json();
  if(data.error)throw new Error(typeof data.error==="string"?data.error:data.error.message||"API Error");
  return data.content?.find(b=>b.type==="text")?.text||"No response returned.";
};

      {[{n:"12",l:"Legal weapons"},{n:"50",l:"States covered"},{n:"Free",l:"To start"}].map(s=>(
        <div key={s.n} style={{background:"#18181f",border:"1px solid rgba(255,255,255,.06)",borderRadius:14,padding:"14px 10px",textAlign:"center"}}>
          <div style={{fontSize:20,fontWeight:900,background:"linear-gradient(135deg,#f87171,#a78bfa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:4}}>{s.n}</div>
          <div style={{fontSize:10,color:"#444"}}>{s.l}</div>
        </div>
      ))}
    </div>

    {/* Share prompt */}
    <div style={{background:"rgba(109,40,217,.06)",border:"1px solid rgba(109,40,217,.2)",borderRadius:16,padding:"18px 20px",marginBottom:20,textAlign:"center"}}>
      <div style={{fontSize:14,fontWeight:800,color:"#fff",marginBottom:6}}>Know someone getting screwed over?</div>
      <div style={{fontSize:12,color:"#555",marginBottom:14}}>Send them Justify. It's free. It fights back.</div>
      <button onClick={()=>{
        if(navigator.share){navigator.share({title:"Justify — AI Legal Defense",text:"Free AI tool that tells you exactly what to say to debt collectors, landlords, and employers. No lawyer needed.",url:window.location.href});}
        else{navigator.clipboard?.writeText(window.location.href);alert("Link copied!");}
      }} style={{background:"linear-gradient(135deg,#6d28d9,#1d4ed8)",border:"none",borderRadius:12,color:"#fff",fontSize:13,fontWeight:700,padding:"12px 24px",cursor:"pointer",fontFamily:"inherit"}}>
        📤 Share Justify
      </button>
    </div>

    <div style={{fontSize:11,color:"#222",lineHeight:1.7,textAlign:"center",padding:"0 10px"}}>⚠ Justify provides general legal information, not legal advice. Consult a licensed attorney in your state for complex matters.</div>
  </div>
);

// ── MAIN APP ──────────────────────────────────────────────────────────────
const App=()=>{
  const [screen,setScreen]=useState("home");
  const [tool,setTool]=useState(null);
  const [freeUsed,setFreeUsed]=useState(loadFree);
  const [isPro,setIsPro]=useState(loadPro);
  const [showPaywall,setShowPaywall]=useState(false);
  const [showEmailGate,setShowEmailGate]=useState(false);
  const [pendingResult,setPendingResult]=useState(null);
  const [captured,setCaptured]=useState(loadCaptured);
  const [disclaimerAccepted,setDisclaimerAccepted]=useState(()=>{try{return localStorage.getItem("jsfy_disc")==="1"}catch{return false}});

  const acceptDisclaimer=()=>{try{localStorage.setItem("jsfy_disc","1")}catch{}setDisclaimerAccepted(true);};
  const checkAccess=()=>true;
  const onAnalysisDone=()=>{if(!isPro){const n=bumpFree();setFreeUsed(n);if(n>=3)setTimeout(()=>setShowPaywall(true),3000);}};
  const onResultReady=(result,showFn)=>{
    if(!captured){
      setPendingResult({result,showFn});
      setShowEmailGate(true);
    } else {
      showFn(result);
    }
  };
  const onEmailCaptured=()=>{
    setCaptured(true);
    setShowEmailGate(false);
    if(pendingResult){pendingResult.showFn(pendingResult.result);setPendingResult(null);}
  };
  const selectTool=id=>{setTool(id);setScreen("tool");window.scrollTo({top:0,behavior:"smooth"});};
  const currentTool=TOOLS.find(t=>t.id===tool);
  const toolProps={checkAccess,onAnalysisDone,isPro,onUpgrade:()=>setShowPaywall(true),captured};

  const renderTool=()=>{
    if(tool==="fight")return <FightTool {...toolProps}/>;
    if(tool==="contract")return <ContractTool {...toolProps}/>;
    return <GenericTool toolId={tool} {...toolProps}/>;
  };

  return(
    <div style={{minHeight:"100vh",background:"#0f0f13",position:"relative"}}>
      {!disclaimerAccepted&&<DisclaimerGate onAccept={acceptDisclaimer}/>}

      {/* Top nav */}
      <nav style={{position:"sticky",top:0,zIndex:300,background:"rgba(15,15,19,.96)",backdropFilter:"blur(24px)",borderBottom:"1px solid rgba(255,255,255,.05)",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
        <button onClick={()=>setScreen("home")} style={{display:"flex",alignItems:"center",gap:10,background:"none",border:"none",cursor:"pointer",padding:0,fontFamily:"inherit"}}>
          <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#6d28d9,#1d4ed8)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:900,color:"#fff",boxShadow:"0 0 16px rgba(109,40,217,.4)"}}>J</div>
          <div>
            <div style={{fontFamily:"'Fraunces',Georgia,serif",fontSize:16,fontWeight:900,color:"#f0f0f0",letterSpacing:-.3}}>Justify</div>
            <div style={{fontSize:9,color:"#4c1d95",letterSpacing:1.5,fontWeight:700,textTransform:"uppercase"}}>AI Legal Defense</div>
          </div>
        </button>
        <div style={{display:"flex",gap:4,overflowX:"auto"}}>
          <button onClick={()=>setScreen("home")} className={`nav-pill ${screen==="home"?"active":"inactive"}`}>Home</button>
          {tool&&<button onClick={()=>setScreen("tool")} className={`nav-pill ${screen==="tool"?"active":"inactive"}`}>{currentTool?.icon} {currentTool?.label}</button>}
        </div>
        <button onClick={()=>setShowPaywall(true)} style={{background:"linear-gradient(135deg,#6d28d9,#1d4ed8)",border:"none",borderRadius:8,color:"#fff",fontSize:11,fontWeight:700,padding:"8px 14px",cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap",flexShrink:0}}>
          {isPro?"✓ Pro":"Upgrade"}
        </button>
      </nav>

      {/* Banner */}
      {!isPro&&freeUsed<3&&(
        <div style={{background:"rgba(109,40,217,.07)",borderBottom:"1px solid rgba(109,40,217,.12)",padding:"8px 24px",textAlign:"center",fontSize:12,color:"#a78bfa",fontWeight:600}}>
          ⚡ <strong>{3-freeUsed} free {3-freeUsed===1?"analysis":"analyses"}</strong> remaining — no account needed
        </div>
      )}
      {!isPro&&freeUsed>=3&&(
        <div onClick={()=>setShowPaywall(true)} style={{background:"rgba(109,40,217,.08)",borderBottom:"1px solid rgba(109,40,217,.15)",padding:"8px 24px",textAlign:"center",fontSize:12,color:"#a78bfa",fontWeight:700,cursor:"pointer"}}>
          🔒 Upgrade for unlimited access — $9.99/mo
        </div>
      )}

      <div style={{maxWidth:640,margin:"0 auto",padding:"28px 18px 80px",position:"relative",zIndex:1}}>
        {screen==="home"&&<Home onSelect={selectTool}/>}
        {screen==="tool"&&tool&&renderTool()}
      </div>

      {showPaywall&&<Paywall onClose={()=>setShowPaywall(false)}/>}
      {showEmailGate&&<EmailGate onComplete={onEmailCaptured}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
