const GenericTool=({toolId,checkAccess,onAnalysisDone,isPro,onUpgrade,captured})=>{
  const tool=TOOLS.find(t=>t.id===toolId);
  const [situation,setSituation]=useState("");
  const [state,setState]=useState("");
  const [extra,setExtra]=useState("");
  const [timeline,setTimeline]=useState("");
  const [tried,setTried]=useState("");
  const [result,setResult]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const configs={
    support:{system:"You are a child support advisor. Be empathetic and direct. Plain text only, ALL CAPS headers.",extraLabel:"Current order amount",extraPh:"e.g. $600/mo",ph:"Which side are you on (paying or receiving)? What's going on? Include dates and amounts..."},
    expunge:{system:"You are a criminal record expungement expert. Plain text only, ALL CAPS headers.",extraLabel:"Charge & year",extraPh:"e.g. Misdemeanor, 2017",ph:"What was the charge and how did the case end? Why do you need it cleared — job, housing?"},
    wage:{system:"You are a wage theft and employment law expert. Plain text only, ALL CAPS headers.",extraLabel:"Amount owed",extraPh:"e.g. $2,400",ph:"Who's your employer? What kind of wage theft — unpaid hours, overtime, tips? How long?"},
    loan:{system:"You are a predatory lending expert. Plain text only, ALL CAPS headers.",extraLabel:"Loan type & rate",extraPh:"e.g. Payday, 400% APR",ph:"Paste the loan terms or describe what they told you, including every fee..."},
    docs:{system:"You are an expert document analyzer. Plain text only, ALL CAPS headers.",extraLabel:"What is this doc?",extraPh:"e.g. Collections letter",ph:"Paste the full text of your document, letter, notice, or contract here..."},
    mortgage:{system:"You are a mortgage and home loan expert. Cite RESPA, TILA, ECOA. Plain text only, ALL CAPS headers.",extraLabel:"Loan amount & rate",extraPh:"e.g. $310k, 7.2%",ph:"Describe your home loan situation. Paste any confusing terms or notices..."},
    smallclaims:{system:"You are a small claims court expert. Plain text only, ALL CAPS headers.",extraLabel:"Amount disputed",extraPh:"e.g. $3,500",ph:"What happened? Who owes who? Are you suing or being sued? What proof do you have?"},
    insurance:{system:"You are an insurance dispute expert. Plain text only, ALL CAPS headers.",extraLabel:"Insurance type",extraPh:"e.g. Auto, health",ph:"What was denied? When? What reason did they give? How much is at stake?"},
    consumer:{system:"You are a consumer rights expert citing FTC Act, FCRA, state laws. Plain text only, ALL CAPS headers.",extraLabel:"Amount involved",extraPh:"e.g. $480",ph:"What did you buy? What went wrong? What have they said when you complained?"},
    idtheft:{system:"You are an identity theft recovery expert. Be urgent and specific. Plain text only, ALL CAPS headers.",extraLabel:"How you found out",extraPh:"e.g. Credit alert",ph:"What happened? Accounts opened in your name? Tax fraud? How did you discover it?"},
  };
  const config=configs[toolId]||configs.docs;
  // Smart model routing: mini for simple info tools, full for complex/high-stakes
  const useMini=MINI_TOOLS.includes(toolId);
  const go=async()=>{
    if(!situation.trim()){setErr("Tell us what's going on so we can give you a real plan.");return;}
    setErr("");setLoading(true);
    try{
      const text=await callAI(
        config.system+" Open with one short, human line that acknowledges what they're going through before the guidance.",
        `STATE: ${state||"Not specified"}\n${config.extraLabel.toUpperCase()}: ${extra||"None"}\nDEADLINE / TIME PRESSURE: ${timeline||"Not specified"}\nWHAT THEY'VE ALREADY TRIED: ${tried||"Nothing yet"}\n\nSITUATION:\n${situation}\n\nProvide detailed, caring guidance with ALL CAPS section headers. End with a NEXT STEPS section: write "NEXT STEPS:" on its own line, then 3-5 short numbered actions in order, one per line, each a single clear sentence.`,
        useMini // mini for: docs, consumer, idtheft, loan, mortgage, expunge
      );
      setResult(text);onAnalysisDone();
    }catch(e){setResult("Error: "+e.message);}
    setLoading(false);
  };
  const reset=()=>{setResult("");setSituation("");setState("");setExtra("");setTimeline("");setTried("");setErr("");};
  if(loading)return <Spinner label="Analyzing your situation..."/>;
  if(result)return <ResultPanel result={result} title={tool?.label} icon={tool?.icon} onNew={reset} isPro={isPro} onUpgrade={onUpgrade} captured={captured} onEmailCaptured={()=>onAnalysisDone()}/>;
  return(
    <div className="fade-up">
      <div style={{marginBottom:6}}>
        <div style={{fontSize:11,color:tool?.color,fontWeight:700,letterSpacing:1.2,marginBottom:7,textTransform:"uppercase"}}>{tool?.icon} {tool?.label}</div>
        <div style={{fontSize:22,fontWeight:800}}>Tell us what's going on.</div>
      </div>
      <div style={{fontSize:12.5,color:"#555",lineHeight:1.6,marginBottom:18}}>The more detail you share, the better we can help. Only the first box is required.</div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div className="field-group">
          <label className="label">Your situation <span className="opt">· required</span></label>
          <textarea value={situation} onChange={e=>{setSituation(e.target.value);setErr("");}} className="field" placeholder={config.ph} style={{minHeight:120}}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div className="field-group"><label className="label">Your state <span className="opt">· optional</span></label><select value={state} onChange={e=>setState(e.target.value)} className="field"><option value="">Select state</option>{US_STATES.map(s=><option key={s}>{s}</option>)}</select></div>
          <div className="field-group"><label className="label">{config.extraLabel} <span className="opt">· optional</span></label><input value={extra} onChange={e=>setExtra(e.target.value)} placeholder={config.extraPh} className="field"/></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div className="field-group"><label className="label">Any deadline? <span className="opt">· optional</span></label><input value={timeline} onChange={e=>setTimeline(e.target.value)} placeholder="e.g. 10 days" className="field"/></div>
          <div className="field-group"><label className="label">Tried anything yet? <span className="opt">· optional</span></label><input value={tried} onChange={e=>setTried(e.target.value)} placeholder="Called, emailed..." className="field"/></div>
        </div>
        {err&&<div style={{background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.2)",borderRadius:10,padding:"12px 16px",fontSize:13,color:"#f87171"}}>⚠ {err}</div>}
        <button onClick={go} disabled={!situation.trim()} className="action-btn" style={{padding:"16px 0",fontSize:15}}>{tool?.icon} Analyze My Situation</button>
        <div style={{fontSize:11,color:"#2a2a2a",textAlign:"center"}}>🔒 Your information is never stored or shared.</div>
      </div>
    </div>
  );
};
